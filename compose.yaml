services:
  postgres:
    image: postgres:17-alpine
    container_name: reserva-salas-postgres
    environment:
      POSTGRES_DB: reserva_salas
      POSTGRES_USER: reserva_user
      POSTGRES_PASSWORD: reserva_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reserva_user -d reserva_salas"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
